title = "Goldhord Gitleaks Config"

[extend]
# Use default rule set as base — covers generic private keys, AWS, API tokens, etc.
useDefault = true

[[rules]]
id = "ethereum-private-key-inline"
description = "Ethereum/Tempo private key passed to privateKeyToAccount or similar"
regex = '''privateKeyToAccount\s*\(\s*["']0x[0-9a-fA-F]{64}["']'''
tags = ["key", "ethereum"]

# Rule-scoped allowlist — only applies to the custom rule above
[rules.allowlist]
paths = [
  '''specs/redesign-code-base/''',
  '''\.test\.ts''',
  '''\.test\.tsx''',
]

# Global allowlist — suppresses ALL rules for these paths/patterns
[allowlist]
paths = [
  '''node_modules/''',
  '''contracts/lib/''',
  '''contracts/cache/''',
  '''contracts/out/''',
  '''bun\.lock''',
  '''\.next/''',
  '''\.env\.local''',
  '''\.env$''',
  '''tempo-mppx/''',
  '''tempo-multisig/''',
  '''tempo-mpp/''',
  '''tempo-docs/''',
  '''specs/''',
  '''ecosystem\.config''',
]
# Well-known test values — publicly documented, not real secrets.
regexes = [
  '''0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80''',
  '''cafebabe:deadbeef''',
  '''playwright-session-secret''',
]
