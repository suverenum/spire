name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  ci:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + Format (Biome)
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Tests
        run: bun run test

      - name: Build
        run: bunx turbo build

  contracts:
    name: Contracts (Foundry + Slither)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge fmt
        run: forge fmt --check

      - name: Forge build
        run: forge build --sizes

      - name: Forge tests
        run: forge test -vvv

      - name: Forge coverage
        run: forge coverage --report summary

      - name: Install Slither
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install slither-analyzer

      - name: Slither scan
        run: slither . --config-file slither.config.json

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar xz
          chmod +x gitleaks

      - name: Run Gitleaks
        run: ./gitleaks detect --source . --config .gitleaks.toml --verbose
